name: ci

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install deps
        run: pnpm install

      # 1. ESLint check
      - name: Lint
        run: pnpm run lint

      # 2. Prettier check
      - name: Format check
        run: pnpm run format:check

      # 3. Type check
      - name: TypeScript check
        run: pnpm run type-check

      # 4. Test
      - name: Run tests
        run: pnpm run test

      # 5. Coverage
      - name: Coverage check
        run: pnpm run test:coverage
