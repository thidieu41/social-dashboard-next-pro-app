name: Quality Gate

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install deps
        run: npm install

      # 1. ESLint check
      - name: Lint
        run: npm run lint

      # 2. Prettier check
      - name: Format check
        run: npm run format:check

      # 3. Type check
      - name: TypeScript check
        run: npm run type-check

      # 4. Test
      - name: Run tests
        run: npm run test

      # 5. Coverage
      - name: Coverage check
        run: npm run test:coverage
